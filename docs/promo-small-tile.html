<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=440">
    <title>Promo Small Tile - 440x280</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 440px;
            height: 280px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00c853 0%, #00a344 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            color: white;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        p {
            font-size: 16px;
            opacity: 0.95;
            margin-bottom: 16px;
        }
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        .decoration {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        .decoration-1 {
            top: -50px;
            right: -50px;
        }
        .decoration-2 {
            bottom: -70px;
            left: -70px;
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="container">
        <div class="icon">📊</div>
        <h1>WhatsLog</h1>
        <p>Export WhatsApp to Sheets</p>
        <span class="badge">Chrome Extension</span>
    </div>
</body>
</html>
