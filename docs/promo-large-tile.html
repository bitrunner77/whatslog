<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=920">
    <title>Promo Large Tile - 920x680</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 920px;
            height: 680px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00c853 0%, #00a344 50%, #008f39 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .container {
            display: flex;
            align-items: center;
            gap: 60px;
            padding: 60px;
            z-index: 1;
        }
        .left {
            color: white;
            flex: 1;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .tagline {
            font-size: 24px;
            opacity: 0.95;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .feature {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
        }
        .right {
            width: 320px;
        }
        .mockup {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
        }
        .mockup-header {
            background: linear-gradient(135deg, #00c853 0%, #00a344 100%);
            color: white;
            padding: 16px;
            text-align: center;
        }
        .mockup-header h3 {
            font-size: 16px;
            margin-bottom: 4px;
        }
        .mockup-header p {
            font-size: 11px;
            opacity: 0.9;
        }
        .mockup-content {
            padding: 16px;
        }
        .mockup-status {
            background: #f0f2f5;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
        }
        .mockup-status h4 {
            font-size: 10px;
            color: #667781;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .mockup-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
        }
        .mockup-label { color: #667781; }
        .mockup-value { font-weight: 500; color: #111b21; }
        .mockup-value.green { color: #00c853; }
        .mockup-btn {
            background: #00c853;
            color: white;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 12px;
            font-weight: 500;
        }
        .decoration {
            position: absolute;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.1);
        }
        .decoration-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }
        .decoration-2 {
            width: 300px;
            height: 300px;
            bottom: -80px;
            left: -80px;
        }
        .decoration-3 {
            width: 200px;
            height: 200px;
            top: 50%;
            left: 30%;
            border-color: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>
    <div class="decoration decoration-1"></div>
    <div class="decoration decoration-2"></div>
    <div class="decoration decoration-3"></div>
    
    <div class="container">
        <div class="left">
            <div class="icon">📊</div>
            <h1>WhatsLog</h1>
            <p class="tagline">Export WhatsApp conversations to Google Sheets, Excel, or CSV in one click</p>
            <div class="features">
                <span class="feature">⚡ One-click export</span>
                <span class="feature">📊 Google Sheets</span>
                <span class="feature">📁 CSV & Excel</span>
                <span class="feature">🔒 100% Private</span>
            </div>
        </div>
        <div class="right">
            <div class="mockup">
                <div class="mockup-header">
                    <h3>📊 WhatsLog</h3>
                    <p>Export WhatsApp to Sheets</p>
                </div>
                <div class="mockup-content">
                    <div class="mockup-status">
                        <h4>Current Status</h4>
                        <div class="mockup-row">
                            <span class="mockup-label">WhatsApp Web</span>
                            <span class="mockup-value green">Connected ✓</span>
                        </div>
                        <div class="mockup-row">
                            <span class="mockup-label">Messages</span>
                            <span class="mockup-value">156 extracted</span>
                        </div>
                    </div>
                    <div class="mockup-btn">Export to Google Sheets →</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
