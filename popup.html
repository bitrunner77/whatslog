<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
    }

    .header {
      background: linear-gradient(135deg, #00c853 0%, #00a344 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
    }

    .status-card h3 {
      font-size: 12px;
      color: #667781;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-item {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
    }

    .status-label {
      color: #667781;
    }

    .status-value {
      font-weight: 500;
      color: #111b21;
    }

    .status-value.active {
      color: #00c853;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: #00c853;
      color: white;
    }

    .btn-primary:hover {
      background: #00a344;
    }

    .btn-secondary {
      background: white;
      color: #111b21;
      border: 1px solid #d1d7db;
    }

    .btn-secondary:hover {
      background: #f5f6f6;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .progress {
      display: none;
      background: white;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .progress.active {
      display: block;
    }

    .progress-bar {
      height: 4px;
      background: #e9edef;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #00c853;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 12px;
      color: #667781;
      margin-top: 8px;
      text-align: center;
    }

    .footer {
      padding: 12px 16px;
      background: white;
      border-top: 1px solid #e9edef;
      text-align: center;
    }

    .footer a {
      color: #00c853;
      text-decoration: none;
      font-size: 12px;
    }

    .message {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    .message.success {
      display: block;
      background: #d4edda;
      color: #155724;
    }

    .message.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 WhatsLog</h1>
    <p>Export WhatsApp to Sheets</p>
  </div>

  <div class="content">
    <div id="message" class="message"></div>

    <div class="status-card">
      <h3>Current Status</h3>
      <div class="status-item">
        <span class="status-label">WhatsApp Web</span>
        <span id="wa-status" class="status-value">Checking...</span>
      </div>
      <div class="status-item">
        <span class="status-label">Messages Extracted</span>
        <span id="msg-count" class="status-value">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">Google Auth</span>
        <span id="auth-status" class="status-value">Not connected</span>
      </div>
    </div>

    <div id="progress" class="progress">
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="progress-text" class="progress-text">Extracting messages...</div>
    </div>

    <button id="btn-extract" class="btn btn-primary">
      🔄 Extract Current Chat
    </button>

    <button id="btn-csv" class="btn btn-secondary" disabled>
      📁 Download CSV
    </button>

    <button id="btn-sheets" class="btn btn-secondary" disabled>
      📊 Export to Google Sheets
    </button>

    <button id="btn-auth" class="btn btn-secondary">
      🔐 Connect Google Account
    </button>
  </div>

  <div class="footer">
    <a href="#" id="link-settings">⚙️ Settings</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
